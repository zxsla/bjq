<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>蓝光笔记 Pro</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5f8cff" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #c8ecff 0%, #6fa8ff 40%, #0b1535 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
      color: #eaf4ff;
      overflow: hidden;
    }
    header {
      padding: 12px 16px;
      backdrop-filter: blur(14px);
      background: rgba(10, 20, 60, 0.45);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header span { font-size: 12px; opacity: .8; }

    #editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      line-height: 1.7;
      border: none;
      outline: none;
      resize: none;
      background: rgba(5, 15, 45, 0.55);
      color: #eaf4ff;
      border-radius: 16px;
      margin: 14px;
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
      -webkit-overflow-scrolling: touch;
    }

    footer {
      padding: 8px 14px 12px;
      font-size: 12px;
      color: rgba(220,235,255,0.75);
      backdrop-filter: blur(10px);
      background: linear-gradient(to top, rgba(3,8,30,0.9), rgba(3,8,30,0));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #061020;
      background: linear-gradient(135deg, #9be2ff, #6fb5ff);
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }
  </style>
</head>
<body>
  <header>
    <h1>蓝光笔记 Pro</h1>
    <span id="status">已自动保存</span>
  </header>

  <textarea id="editor" placeholder="开始记录你的灵感…（支持离线 & 主屏幕 App）"></textarea>

  <footer>
    <span>本地离线保存</span>
    <button id="clearBtn">清空</button>
  </footer>

  <script>
    const KEY = "cool_blue_editor_pro_v1";
    const editor = document.getElementById("editor");
    const status = document.getElementById("status");

    editor.value = localStorage.getItem(KEY) || "";

    let timer = null;
    editor.addEventListener("input", () => {
      status.textContent = "保存中…";
      clearTimeout(timer);
      timer = setTimeout(() => {
        localStorage.setItem(KEY, editor.value);
        status.textContent = "已自动保存";
      }, 400);
    });

    document.getElementById("clearBtn").onclick = () => {
      if (confirm("确定清空所有内容？")) {
        editor.value = "";
        localStorage.removeItem(KEY);
        status.textContent = "已清空";
      }
    };

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
