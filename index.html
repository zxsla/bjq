<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>蓝光代码编辑器 · 文件版</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1b3d" />

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>

  <!-- 主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">

  <!-- 多语言 -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/json/json.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #1a2a6c, #1e3c72, #0d1b3d);
      font-family: "JetBrains Mono", monospace;
      color: #eaf4ff;
    }

    header {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9bd1ff;
      text-shadow: 0 0 8px #4fa3ff;
    }

    #editor { flex: 1; }

    footer {
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9bd1ff;
      gap: 10px;
    }

    select, button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #6fb5ff;
      color: #061020;
      font-size: 12px;
      box-shadow: 0 0 10px #6fb5ff;
    }

    .file-buttons {
      display: flex;
      gap: 10px;
    }

    /* --- 跑马灯（彩色渐变 + 发光） --- */
    .marquee {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      padding: 8px 0;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #ff6ec4, #7873f5, #4fd1ff, #6fffb0);
      background-size: 300%;
      -webkit-background-clip: text;
      color: transparent;
      animation: scroll 10s linear infinite, glow 4s ease-in-out infinite, gradientMove 6s linear infinite;
      text-shadow: 0 0 12px rgba(100,150,255,0.6);
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    @keyframes gradientMove {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 8px rgba(100,150,255,0.6); }
      50% { text-shadow: 0 0 18px rgba(100,200,255,1); }
    }
  </style>
</head>
<body>
  <header>
    <h1>蓝光代码编辑器 · 文件版</h1>
    <span id="status">未打开文件</span>
  </header>

  <textarea id="editor"></textarea>

  <footer>
    <select id="modeSelect">
      <option value="javascript">JavaScript</option>
      <option value="htmlmixed">HTML</option>
      <option value="css">CSS</option>
      <option value="json">JSON</option>
      <option value="python">Python</option>
      <option value="text/x-java">Java</option>
      <option value="text/x-csrc">C</option>
      <option value="markdown">Markdown</option>
    </select>

    <div class="file-buttons" id="fileButtons">
      <button id="openBtn">打开文件</button>
      <button id="saveBtn">保存</button>
      <button id="saveAsBtn">另存为</button>
    </div>
  </footer>

  <!-- 跑马灯 -->
  <div class="marquee">
    <span>♡｡eternity.✨</span>
  </div>

  <script>
    let fileHandle = null;
    const status = document.getElementById("status");

    const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
      lineNumbers: true,
      mode: "javascript",
      theme: "dracula",
      tabSize: 2,
      lineWrapping: true
    });

    document.getElementById("modeSelect").onchange = e => {
      cm.setOption("mode", e.target.value);
    };

    // 判断是否为 PWA 模式
    const isPWA = window.matchMedia("(display-mode: standalone)").matches;

    if (isPWA) {
      document.getElementById("fileButtons").style.display = "none";
      status.textContent = "PWA 模式：文件功能已隐藏";
    }

    // 打开文件
    document.getElementById("openBtn").onclick = async () => {
      try {
        [fileHandle] = await window.showOpenFilePicker();
        const file = await fileHandle.getFile();
        const text = await file.text();
        cm.setValue(text);
        status.textContent = "已打开：" + file.name;
      } catch (err) {
        console.log(err);
      }
    };

    // 保存文件
    document.getElementById("saveBtn").onclick = async () => {
      if (!fileHandle) {
        alert("请先打开文件");
        return;
      }
      const writable = await fileHandle.createWritable();
      await writable.write(cm.getValue());
      await writable.close();
      status.textContent = "已保存";
    };

    // 另存为
    document.getElementById("saveAsBtn").onclick = async () => {
      try {
        const newHandle = await window.showSaveFilePicker();
        const writable = await newHandle.createWritable();
        await writable.write(cm.getValue());
        await writable.close();
        status.textContent = "已另存为";
      } catch (err) {
        console.log(err);
      }
    };
  </script>
</body>
</html>
