<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>蓝光代码编辑器</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5f8cff" />

  <!-- CodeMirror 核心 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>

  <!-- 常用语法高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0b1535;
      color: #eaf4ff;
      font-family: "JetBrains Mono", monospace;
    }
    header {
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    header span { font-size: 12px; opacity: .8; }
    #editor { flex: 1; }
    footer {
      padding: 8px 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #6fb5ff;
      color: #061020;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1 style="font-size:16px;">蓝光代码编辑器</h1>
    <span id="status">已自动保存</span>
  </header>

  <textarea id="editor"></textarea>

  <footer>
    <span>离线可用 · 自动保存</span>
    <button id="clearBtn">清空</button>
  </footer>

  <script>
    const KEY = "blue_code_editor_v1";
    const status = document.getElementById("status");

    const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
      lineNumbers: true,
      mode: "javascript",
      tabSize: 2,
      lineWrapping: true
    });

    cm.setValue(localStorage.getItem(KEY) || "// 蓝光代码编辑器\n");

    let timer = null;
    cm.on("change", () => {
      status.textContent = "保存中…";
      clearTimeout(timer);
      timer = setTimeout(() => {
        localStorage.setItem(KEY, cm.getValue());
        status.textContent = "已自动保存";
      }, 400);
    });

    document.getElementById("clearBtn").onclick = () => {
      if (confirm("确定清空所有内容？")) {
        cm.setValue("");
        localStorage.removeItem(KEY);
        status.textContent = "已清空";
      }
    };

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
